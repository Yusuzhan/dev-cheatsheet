<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}} Cheatsheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: {{.Primary}};
  --primary-dark: {{.PrimaryDark}};
  --primary-deeper: {{.PrimaryDeeper}};
  --primary-light: {{.PrimaryLight}};
  --primary-glow: {{.PrimaryGlow}};
  --accent: #F77F00;
  --bg: #F0F7FB;
  --card: #FFFFFF;
  --text: #1B2A3D;
  --text-secondary: #5A7089;
  --border: rgba(0, 173, 216, 0.08);
  --shadow-sm: 0 1px 3px rgba(0, 95, 115, 0.04), 0 1px 2px rgba(0, 95, 115, 0.02);
  --shadow-md: 0 4px 16px rgba(0, 95, 115, 0.06), 0 2px 4px rgba(0, 95, 115, 0.03);
  --shadow-lg: 0 12px 40px rgba(0, 95, 115, 0.08), 0 4px 12px rgba(0, 95, 115, 0.04);
  --radius: 16px;
  --radius-sm: 10px;
}

html { scroll-behavior: smooth; scroll-padding-top: 70px; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

header {
  background: linear-gradient(160deg, {{.PrimaryDeeper}} 0%, {{.Primary}} 45%, {{.PrimaryLight}} 100%);
  color: #fff;
  text-align: center;
  padding: 28px 20px 20px;
  position: relative;
  overflow: hidden;
}

header::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 600px 400px at 20% 80%, rgba(255,255,255,0.08), transparent),
    radial-gradient(ellipse 400px 300px at 80% 20%, rgba(255,255,255,0.1), transparent);
  pointer-events: none;
}

header h1 {
  font-size: 3rem;
  font-weight: 800;
  letter-spacing: -1px;
  position: relative;
}

header h1 .icon {
  margin-right: 12px;
  vertical-align: middle;
}

.locale-toggle {
  display: inline-flex;
  gap: 4px;
  margin-top: 14px;
  background: rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 4px;
  position: relative;
}

.locale-toggle button {
  padding: 6px 16px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: rgba(255,255,255,0.7);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit;
}

.locale-toggle button:hover {
  color: #fff;
  background: rgba(255,255,255,0.1);
}

.locale-toggle button.active {
  background: rgba(255,255,255,0.25);
  color: #fff;
}

nav {
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
}

nav ul {
  display: flex;
  gap: 2px;
  padding: 10px 24px;
  overflow-x: auto;
  justify-content: center;
  flex-wrap: wrap;
  list-style: none;
}

nav a {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 8px;
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 0.82rem;
  font-weight: 500;
  white-space: nowrap;
  transition: all 0.2s ease;
  letter-spacing: 0.2px;
}

nav a i { font-size: 0.75rem; }

nav a:hover {
  background: var(--primary-light);
  color: var(--primary-dark);
  transform: translateY(-1px);
}

.container {
  max-width: 2200px;
  margin: 0 auto;
  padding: 36px 12px 72px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
}

.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 0;
  box-shadow: var(--shadow-sm);
  transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  border: 1px solid var(--border);
  overflow: hidden;
  position: relative;
}

.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.35s ease;
}

.card:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-4px);
  border-color: rgba(0, 173, 216, 0.15);
}

.card:hover::before { opacity: 1; }

.card-header {
  padding: 20px 24px 0;
}

.card h2 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--primary-deeper);
  display: flex;
  align-items: center;
  gap: 10px;
}

.card h2 .icon {
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
  background: var(--primary-light);
  border-radius: 9px;
  flex-shrink: 0;
  color: var(--primary-dark);
}

.card-body {
  padding: 14px 24px 22px;
}

pre {
  margin: 0 !important;
  border-radius: var(--radius-sm) !important;
  font-size: 0.82rem !important;
  padding: 16px 20px !important;
  background: #F6F9FC !important;
  border: 1px solid rgba(0, 173, 216, 0.1) !important;
  line-height: 1.65 !important;
  overflow-x: auto;
}

code {
  font-family: 'JetBrains Mono', Consolas, monospace !important;
  font-size: 0.82rem !important;
}

.card p, .card ul {
  font-size: 0.9rem;
  color: var(--text-secondary);
  margin-bottom: 10px;
}

.card ul { padding-left: 20px; }
.card li { margin-bottom: 4px; }

footer {
  text-align: center;
  padding: 36px 20px 48px;
  color: var(--text-secondary);
  font-size: 0.85rem;
}

footer a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 500;
}

.locale-content { display: none; }
.locale-content.active { display: block; }

@media (max-width: 1024px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 680px) {
  .grid { grid-template-columns: 1fr; }
  header h1 { font-size: 2rem; }
  header h1 .icon { font-size: 1.8rem; }
  header { padding: 44px 20px 36px; }
  nav ul { justify-content: flex-start; }
}

@media print {
  nav { display: none; }
  .locale-toggle { display: none; }
  .card { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
  header { background: #fff; color: #000; }
  .card:hover { transform: none; box-shadow: none; }
  .locale-content { display: block !important; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card {
  animation: fadeUp 0.5s ease forwards;
  opacity: 0;
}

{{range $i, $v := .Variants}}{{range $j, $sec := .Cheatsheet.Sections}}[data-locale="{{$v.Locale}}"] .card:nth-child({{add 1 $j}}) { animation-delay: {{mul 20 $j}}ms; }
{{end}}{{end}}
</style>
</head>
<body>

<header>
  <h1><span class="icon"><i class="fas {{.Icon}}"></i></span> {{.Title}}</h1>
  <div class="locale-toggle">
    {{range .Variants}}<button data-locale="{{.Locale}}"{{if eq .Locale $.DefaultLocale}} class="active"{{end}}>{{.Label}}</button>
    {{end}}
  </div>
</header>

{{range $vIdx, $v := .Variants}}
<div class="locale-content{{if eq $v.Locale $.DefaultLocale}} active{{end}}" data-locale="{{$v.Locale}}">
<nav>
  <ul>
    {{range $v.Cheatsheet.Sections}}<li><a href="#{{$v.Locale}}-{{.ID}}"><i class="fas {{.Icon}}"></i> {{.Title}}</a></li>
    {{end}}
  </ul>
</nav>

<div class="container">
<div class="grid">

{{range $v.Cheatsheet.Sections}}<div class="card" id="{{$v.Locale}}-{{.ID}}">
  <div class="card-header">
    <h2><span class="icon"><i class="fas {{.Icon}}"></i></span> {{.Title}}</h2>
  </div>
  <div class="card-body">
    {{.Content}}
  </div>
</div>
{{end}}

</div>
</div>
</div>
{{end}}

<footer>
  <p>{{.Title}} Cheatsheet &mdash; Built with &#10084;&#65039; for developers &nbsp;|&nbsp; Generated by <a href="https://github.com/Yusuzhan/dev-cheatsheet" target="_blank">cheatsheetgen</a></p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-{{.Lang}}.min.js"></script>
<script>
(function() {
  var buttons = document.querySelectorAll('.locale-toggle button');
  var contents = document.querySelectorAll('.locale-content');
  var defaultLocale = '{{.DefaultLocale}}';

  function switchLocale(loc) {
    buttons.forEach(function(b) { b.classList.toggle('active', b.dataset.locale === loc); });
    contents.forEach(function(c) { c.classList.toggle('active', c.dataset.locale === loc); });
    if (loc !== defaultLocale) {
      history.replaceState(null, '', '#' + loc);
    } else {
      history.replaceState(null, '', window.location.pathname);
    }
  }

  buttons.forEach(function(btn) {
    btn.addEventListener('click', function() { switchLocale(btn.dataset.locale); });
  });

  var hash = window.location.hash.replace('#', '');
  if (hash) {
    var found = false;
    contents.forEach(function(c) { if (c.dataset.locale === hash) found = true; });
    if (found) switchLocale(hash);
  }
})();
</script>
</body>
</html>
